set-option -g default-shell /bin/zsh

# Terminal capabilities
set -g default-terminal "tmux-256color"
set-environment -g COLORTERM "truecolor"

# Outer terminals tmux may be attached to.
set -as terminal-features ",alacritty:RGB:clipboard:extkeys:focus:title"
set -as terminal-features ",xterm-ghostty:RGB:clipboard:extkeys:focus:title"
set -as terminal-features ",tmux-256color:RGB:clipboard:extkeys:focus:title"
set -as terminal-features ",xterm-256color:RGB:clipboard:extkeys:focus:title"

# fix escape for (n)vim 
set-option -g escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# mouse on
set -g mouse on

# forward copy-mode / mouse selections to the outer terminal's clipboard (OSC 52)
set -g set-clipboard on

# pass extended key sequences through to applications
set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u


# Keep current working path
bind '"' split-window -c    "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind 'c' new-window   -c    "#{pane_current_path}"

# vim like
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g focus-events on
