[env]
WINIT_X11_SCALE_FACTOR = '1.0'
COLORTERM = "truecolor"

[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]

[window]
decorations = "Full"
decorations_theme_variant = "Dark"
blur = true
opacity = 0.9
padding = { x = 5, y = 5 }
dynamic_padding = true

[scrolling]
history = 100000

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
size = 14

[colors]
transparent_background_colors = true

[colors.primary]
background = "#21252b"
foreground = "#abb2bf"

[colors.cursor]
text = "#21252b"
cursor = "#abb2bf"

[colors.selection]
text = "#abb2bf"
background = "#323844"

[colors.normal]
black = "#21252b"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"

[colors.bright]
black = "#767676"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"

[cursor]
style = {blinking = "On"}

[mouse]
bindings = [
    { mouse = "Right", action = "Copy"},
    { mouse = "Middle", action="Paste"},
    # { mouse = "Right", action = "Paste"},
    # { mouse = "Middle", action="Copy"},
]

[keyboard]
bindings = [
#    { key = "V", mods = "Control", action="Paste"},
    { key="F11", action="ToggleFullscreen"},
    { key="F11", mods = "Control", action="ToggleMaximized"}
]
